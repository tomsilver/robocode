defaults:
  - approach: random
  - environment: small_maze
  - _self_

seed: 42
max_steps: 1000
num_eval_tasks: 100
# Per-instance eval wall-clock budget (seconds), shared by every approach.
eval_timeout: 30
render_videos: false
record_approach_history: false
primitives:
  - check_action_collision
  - csp
  - BiRRT
mcp_tools:
  - render_state
  - render_policy
