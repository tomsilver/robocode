# ClutteredStorage2D with a variable object count. The number of blocks must be
# ODD (the family splits them between the shelf and the outside), so all configured
# counts are odd. Design counts are small; held-out counts (11, 15) are larger.
_target_: robocode.environments.variable_object_count_env.VariableObjectCountEnv
constant_object_env_path: kinder.envs.kinematic2d.clutteredstorage2d:ClutteredStorage2DEnv
count_kwarg: num_blocks
count_object_prefix: block
design_counts: [1, 3, 7]
eval_counts: [1, 3, 7, 11, 15]
bilevel_env_name: clutteredstorage2d
